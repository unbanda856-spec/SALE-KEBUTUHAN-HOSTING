<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Hosting</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#1f1f1f;
color:white;
}

/* LOADING SCREEN */

#loading{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

#loading img{
width:120px;
animation:spin 3s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

#loading h2{
margin-top:20px;
text-align:center;
color:white;
font-size:18px;
}

/* HEADER */

header{
background:#2b2b2b;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

/* CONTAINER */

.container{
padding:30px;
}

/* PRODUK SEJAJAR */

.products{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.card{
background:#333;
padding:20px;
border-radius:10px;
width:220px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
background:#444;
}

.price{
font-size:20px;
color:#00ffcc;
margin:10px 0;
}

button{
background:#00ffcc;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#00cc99;
}

footer{
text-align:center;
padding:20px;
background:#2b2b2b;
margin-top:30px;
}

</style>
</head>

<body>

<!-- LOADING SCREEN -->

<div id="loading">
<img src="poto.png">
<h2>WELCOME DI WEBSITE KEBUTUHAN HOSTING<br>
SILAKAN MASUK DAN MEMILIH SESUKA HATI ANDA</h2>
</div>

<!-- MUSIK -->

<audio id="musik" autoplay loop hidden>
<source src="lagu.mp3" type="audio/mp3">
</audio>

<script>
let musik = document.getElementById("musik");

/* jika browser memblokir autoplay */
document.addEventListener("click", function () {
musik.play();
});
</script>

<header>
SALE PANEL PTERODACTYL
</header>

<div class="container">

<div class="products">

<div class="card">
<h3>Panel 5GB</h3>
<div class="price">Rp 3.000</div>
<button>Beli</button>
</div>

<div class="card">
<h3>Panel 10GB</h3>
<div class="price">Rp 5.000</div>
<button>Beli</button>
</div>

<div class="card">
<h3>Panel Unlimited</h3>
<div class="price">Rp 7.000</div>
<button>Beli</button>
</div>

<div class="card">
<h3>Reseller Panel</h3>
<div class="price">Rp 5.000</div>
<button>Beli</button>
</div>

</div>

</div>

<footer>
© 2026 Website Hosting
</footer>

<script>

window.onload = function(){
setTimeout(function(){
document.getElementById("loading").style.display="none";
},3000);
}

</script>

</body>
</html>
